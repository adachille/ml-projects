name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Check formatting
        run: uvx ruff format --check chessmate
      - name: Check linting
        run: uvx ruff check chessmate
      - name: Type check
        run: uv run --project chessmate mypy chessmate/src
